<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transparenter — 画像透過ツール</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header id="toolbar">
        <button id="btn-open" class="primary">画像を開く</button>
        <div id="view-switch" class="segment">
          <button data-mode="result" class="active">結果</button>
          <button data-mode="original">元画像</button>
          <button data-mode="alpha" title="透過の度合いを白黒の濃淡で表示">アルファ</button>
          <button data-mode="semi" title="半透明のピクセルだけを赤く表示">半透明検出</button>
        </div>
        <span id="status"></span>
        <button id="btn-save" class="primary" disabled>PNGを保存</button>
      </header>

      <main>
        <div id="canvas-wrap">
          <canvas id="preview"></canvas>
          <div id="brush-cursor"></div>
          <div id="zoom-controls">
            <button id="zoom-out" title="縮小 (⌘−)">−</button>
            <span id="zoom-level">100%</span>
            <button id="zoom-in" title="拡大 (⌘+)">＋</button>
            <button id="zoom-fit" title="全体表示 (⌘0)">全体</button>
          </div>
          <div id="dropzone">
            <p>ここに画像をドラッグ&amp;ドロップ<br />または「画像を開く」</p>
          </div>
        </div>

        <aside id="panel">
          <section>
            <h3>キー色(背景色)</h3>
            <div class="key-row">
              <div id="key-swatch"></div>
              <span id="key-value">未設定</span>
            </div>
            <div id="tool-switch" class="segment">
              <button data-tool="eyedropper" class="active">スポイト</button>
              <button data-tool="spot">追加透過</button>
              <button data-tool="brush">ブラシ</button>
            </div>
            <p class="hint" id="tool-hint"></p>
          </section>

          <section id="section-adjust">
            <h3>透過調整</h3>
            <div id="sliders-main"></div>
          </section>

          <section id="section-spot">
            <h3>追加透過(残った部分をクリックで消す)</h3>
            <div id="sliders-spot"></div>
            <label class="check-row">
              <input type="checkbox" id="spot-global" />
              同じ色を画像全体から透過
            </label>
          </section>

          <section id="section-brush">
            <h3>ブラシ(透明・不透明を塗って直す)</h3>
            <div id="brush-mode" class="segment">
              <button data-brushmode="opaque" class="active">不透明に戻す</button>
              <button data-brushmode="erase">透明にする</button>
            </div>
            <div id="sliders-brush"></div>
          </section>

          <section id="section-binarize">
            <h3>半透明の仕上げ</h3>
            <label class="check-row">
              <input type="checkbox" id="binarize" />
              半透明をなくす(0/1に確定)
            </label>
            <div id="sliders-binarize"></div>
            <p class="hint" id="semi-info"></p>
          </section>

          <section id="section-history">
            <h3>編集履歴</h3>
            <div class="button-row">
              <button id="btn-undo" disabled>元に戻す (⌘Z)</button>
              <button id="btn-clear-spots" disabled>全て消去</button>
            </div>
            <p class="hint" id="spot-count"></p>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
